<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>404 — Page Not Found · FitMart</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/styles.css"/>
<script src="assets/nav.js"></script>
<style>
.err-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 24px}

.err-sub{font-size:15px;color:var(--muted);max-width:400px;margin:0 auto 32px;line-height:1.7}

<body>
<div class="err-wrap">
  <div>
    <div class="err-code rv">404</div>
    <h1 class="err-title rv">Page Not Found</h1>

    <div class="err-links rv">
      <a class="btn-main" href="index.html">← Go Home</a>
